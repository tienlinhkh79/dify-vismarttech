identity:
  name: kiotviet_surcharges
  author: Dify Community
  label:
    en_US: KiotViet Surcharges
    vi_VN: KiotViet Phụ thu
description:
  human:
    en_US: Manage surcharges on KiotViet - list, create, update, delete.
    vi_VN: Quản lý phụ thu trên KiotViet.
