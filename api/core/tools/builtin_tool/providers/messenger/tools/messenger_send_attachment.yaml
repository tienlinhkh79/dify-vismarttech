identity:
  name: messenger_send_attachment
  author: Dify Community
  label:
    en_US: Send Attachment
    vi_VN: Gui tep dinh kem
description:
  human:
    en_US: Send an image, video, audio, or file to a Facebook Messenger user by PSID.
    vi_VN: Gui hinh anh, video, audio hoac file den nguoi dung Messenger bang PSID.
  llm: Send a Facebook Messenger attachment message to a user by recipient PSID.
parameters:
  - name: recipient_id
    type: string
    required: true
    form: llm
    label:
      en_US: Recipient PSID
      vi_VN: Recipient PSID
    human_description:
      en_US: Facebook Page-Scoped User ID (PSID) of the recipient.
      vi_VN: Facebook Page-Scoped User ID (PSID) cua nguoi nhan.
  - name: attachment_type
    type: string
    required: true
    form: llm
    label:
      en_US: Attachment Type
      vi_VN: Loai tep
    human_description:
      en_US: One of image, video, audio, file.
      vi_VN: Mot trong cac gia tri image, video, audio, file.
  - name: attachment_url
    type: string
    required: true
    form: llm
    label:
      en_US: Attachment URL
      vi_VN: URL tep dinh kem
    human_description:
      en_US: Public URL to the attachment file.
      vi_VN: URL cong khai den tep dinh kem.
