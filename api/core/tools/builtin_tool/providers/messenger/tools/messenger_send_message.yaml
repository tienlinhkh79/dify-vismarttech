identity:
  name: messenger_send_message
  author: Dify Community
  label:
    en_US: Send Message
    vi_VN: Gui tin nhan
description:
  human:
    en_US: Send a text message to a Facebook Messenger user by PSID.
    vi_VN: Gui tin nhan van ban den nguoi dung Messenger bang PSID.
  llm: Send a Facebook Messenger text message to a user by recipient PSID.
parameters:
  - name: recipient_id
    type: string
    required: true
    form: llm
    label:
      en_US: Recipient PSID
      vi_VN: Recipient PSID
    human_description:
      en_US: Facebook Page-Scoped User ID (PSID) of the recipient.
      vi_VN: Facebook Page-Scoped User ID (PSID) cua nguoi nhan.
  - name: message_text
    type: string
    required: true
    form: llm
    label:
      en_US: Message Text
      vi_VN: Noi dung tin nhan
    human_description:
      en_US: Text content to send.
      vi_VN: Noi dung van ban can gui.
