    type: string
    required: true
    form: llm
    label:
      en_US: Recipient PSID
      vi_VN: Recipient PSID
    human_description:
      en_US: Facebook Page-Scoped User ID (PSID) of the recipient.
      vi_VN: Facebook Page-Scoped User ID (PSID) cua nguoi nhan.
  - name: template_payload_json
    type: string
    required: true
    form: llm
    label:
      en_US: Template Payload JSON
      vi_VN: JSON template payload
    human_description:
      en_US: JSON object for Messenger template attachment payload.
      vi_VN: Doi tuong JSON cho payload template attachment cua Messenger.
